server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: xiyue-backend
  datasource:
    url: "jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3307}/${MYSQL_DATABASE:xiyue_platform}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
    username: ${MYSQL_USER:root}
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD}
      timeout: 3000ms
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

# 业务配置
xiyue:
  jwt:
    # JWT 签名密钥（HS256），至少 32 字节，密码学安全随机值，禁止入库
    secret: ${JWT_SECRET:}
    # Token 有效期（毫秒），默认 7 天
    expiration-ms: 604800000
  admin:
    # 管理员初始密码，仅 AdminAccountInitializer 创建 ADMIN 账号时使用，禁止入库
    init-password: ${ADMIN_INIT_PASSWORD:}
    # 管理员手机号（默认占位号，生产环境请通过环境变量覆盖）
    phone: ${ADMIN_PHONE:13800000000}
  sms:
    # 发送验证码频率限制（秒），同一手机号间隔内只能发一次
    resend-interval-seconds: 60

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.xiyue

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.xiyue: debug
    org.springframework.security: info
